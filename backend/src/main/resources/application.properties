# DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:smarttrainer}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:Ayman123}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA/Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#App properties
spring.application.name=backend
server.port=8082

#Security token
app.security.jwt-secret=${SECRET_KEY}
app.security.jwt-expiration=${SECRET_EXPIRATION}

# Exposer le endpoint Prometheus et le Health check
management.endpoints.web.exposure.include=health,prometheus
# Activer explicitement le endpoint prometheus
management.endpoint.prometheus.enabled=true
# Optionnel : Inclure les détails du health check
management.endpoint.health.show-details=always
