<div class="ap-root">
  <div class="ap-header">
    <div>
      <div class="ap-eyebrow">System Configuration</div>
      <h1 class="ap-title">Settings</h1>
      <p class="ap-subtitle">Configure platform behavior, security, pricing and notifications.</p>
    </div>
    <div class="ap-header-actions">
      <button class="btn-primary" (click)="save()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        {{ saved ? '✓ Saved!' : 'Save Changes' }}
      </button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="settings-tabs">
    <button class="stab stab--active">
      <span>⚙️</span> General
    </button>
  </div>

  <!-- General Tab -->
  <div class="settings-grid">
    <div class="settings-card">
      <div class="sc-title">Personal Info</div>
      <div class="field-group">
        <label class="field-label">First Name</label>
        <input class="field-input" [(ngModel)]="firstname" />
      </div>
      <div class="field-group">
        <label class="field-label">Last Name</label>
        <input class="field-input" [(ngModel)]="lastname" />
      </div>
      <div class="field-group">
        <label class="field-label">Email</label>
        <input class="field-input" [(ngModel)]="email" type="email" />
      </div>
    </div>
    <div class="settings-card">
      <div class="sc-title">Platform Identity</div>
      <div class="field-group">
        <label class="field-label">Platform Name</label>
        <input class="field-input" [(ngModel)]="platformName" />
      </div>
      <div class="field-group">
        <label class="field-label">Tagline</label>
        <input class="field-input" [(ngModel)]="tagline" />
      </div>
      <div class="field-group">
        <label class="field-label">Support Email</label>
        <input class="field-input" [(ngModel)]="supportEmail" type="email" />
      </div>
    </div>
    <div class="settings-card">
      <div class="sc-title">Platform Behavior</div>
      <div class="toggle-group">
        <div class="toggle-item">
          <div>
            <div class="toggle-label">Maintenance Mode</div>
            <div class="toggle-desc">Temporarily disable the platform for all users</div>
          </div>
          <button class="toggle-btn" [class.toggle-btn--on]="maintenanceMode" (click)="maintenanceMode = !maintenanceMode">
            <span class="toggle-knob"></span>
          </button>
        </div>

      </div>
    </div>
  </div>
