<div class="p-8 bg-slate-50 min-h-screen">
  
  <!-- 🌟 Top Control Bar matching your screenshot structure perfectly -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
    <div>
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Community Feed</h1>
      <p class="text-sm text-slate-500 mt-1">Latest system announcements, notifications, and updates around your club.</p>
    </div>
    
    <div class="flex items-center gap-3 self-end md:self-auto">
      <!-- Search Input aligned left of the button -->
      <div class="relative">
        <input type="text" placeholder="Search posts..." 
               class="w-64 pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all shadow-sm">
        <span class="absolute left-3.5 top-3.5 text-slate-400 text-xs">🔍</span>
      </div>
      
      <!-- Styled Action Button -->
      <button (click)="openModal()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 py-2.5 rounded-xl text-sm shadow-md shadow-blue-500/10 transition-all transform active:scale-95">
        ＋ Add Post
      </button>
    </div>
  </div>

  <!-- Announcement Posts Feed Wall -->
  <div class="max-w-3xl mx-auto space-y-4">
    <div *ngFor="let post of posts" class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 hover:shadow-md transition-all duration-300 relative flex gap-4">
      
      <div class="w-1 bg-gradient-to-b from-blue-500 to-indigo-500 rounded-full h-auto"></div>
      
      <div class="flex-1">
        <div class="flex items-start justify-between gap-4 mb-2">
          <div class="flex items-center gap-2">
            <span class="text-base">📢</span>
            <h3 class="font-bold text-slate-800 text-base tracking-tight">{{ post.title }}</h3>
          </div>
          <span class="px-2.5 py-0.5 rounded-full text-[9px] font-bold tracking-wider uppercase bg-slate-100 text-slate-500 border border-slate-200/50">
            {{ post.category }}
          </span>
        </div>
        
        <p class="text-slate-600 text-sm leading-relaxed mb-3 font-medium">{{ post.content }}</p>
        
        <div class="flex items-center justify-between text-xs text-slate-400 font-semibold pt-2 border-t border-slate-50">
          <span>SmartTrainer Broadcast</span>
          <span class="text-blue-500 bg-blue-50 px-2 py-0.5 rounded-md text-[10px]">{{ post.date }}</span>
        </div>
      </div>

    </div>
  </div>

  <!-- Modern Modal Overlay for Adding a New Post -->
  <div *ngIf="isModalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl border border-slate-100 p-6 relative">
      <button (click)="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 p-1.5 rounded-lg hover:bg-slate-100 transition-colors">✕</button>
      
      <div class="mb-5">
        <h3 class="text-lg font-bold text-slate-800">Create Community Post</h3>
        <p class="text-xs text-slate-400 mt-1">Publish announcements or events directly to the feed.</p>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Post Title</label>
          <input type="text" [(ngModel)]="newPost.title" placeholder="e.g. Summer Pool Maintenance 🏊‍♂️" 
                 class="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-slate-800">
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Category</label>
          <select [(ngModel)]="newPost.category" 
                  class="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-slate-800">
            <option value="Announcement">Announcement</option>
            <option value="Event">Event</option>
            <option value="Alert">Alert</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Content Message</label>
          <textarea [(ngModel)]="newPost.content" rows="4" placeholder="Write details here..." 
                    class="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-slate-800 resize-none"></textarea>
        </div>
      </div>

      <div class="flex gap-3 mt-6 pt-4 border-t border-slate-100">
        <button (click)="closeModal()" class="w-1/2 py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">Cancel</button>
        <button (click)="savePost()" class="w-1/2 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold shadow-md transition-colors">Publish Post</button>
      </div>
    </div>
  </div>
</div>
