<div class="page-wrapper">
  <div class="page-header">
    <div>
      <h2 class="page-title">Community</h2>
      <p class="page-subtitle">Interagissez avec vos <strong>clients</strong> et la communauté</p>
    </div>
    <button class="btn-primary">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      Nouvelle Publication
    </button>
  </div>

  <div class="posts-feed">
    @for (post of posts; track post.author) {
      <div class="post-card">
        <div class="post-header">
          <div class="post-avatar" [style.background]="post.color">{{ post.initials }}</div>
          <div class="post-author-info">
            <p class="post-author">{{ post.author }}</p>
            <span class="post-time">{{ post.time }}</span>
          </div>
          <button class="post-menu-btn">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01"/>
            </svg>
          </button>
        </div>
        <p class="post-content">{{ post.content }}</p>
        <div class="post-actions">
          <button class="post-action-btn" [class.liked]="post.liked" (click)="toggleLike(post)">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" [attr.fill]="post.liked ? 'currentColor' : 'none'">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
            </svg>
            {{ post.likes }}
          </button>
          <button class="post-action-btn">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
            </svg>
            {{ post.comments }}
          </button>
          <button class="post-action-btn">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
            </svg>
            Partager
          </button>
        </div>
      </div>
    }
  </div>
</div>
