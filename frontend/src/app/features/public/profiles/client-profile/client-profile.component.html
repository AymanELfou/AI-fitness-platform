<h2 class="section-form-title">🏃‍♂️ Setup Client Metrics</h2>
<form [formGroup]="clientForm" (ngSubmit)="submit()">
  <div class="form-grid-layout">
    
    <div class="form-ctrl">
      <label>Age</label>
      <input type="number" formControlName="age" placeholder="e.g., 24"
             [ngClass]="{'invalid-touched': isInvalid('age')}">
      <div *ngIf="isInvalid('age')" class="error-msg">⚠️ Minimum age allowed is 12.</div>
    </div>

    <div class="form-ctrl">
      <label>Poids (Kg)</label>
      <input type="number" formControlName="poids" placeholder="e.g., 75"
             [ngClass]="{'invalid-touched': isInvalid('poids')}">
      <div *ngIf="isInvalid('poids')" class="error-msg">⚠️ Weight is required (Min 30Kg).</div>
    </div>

    <div class="form-ctrl">
      <label>Taille (Cm)</label>
      <input type="number" formControlName="taille" placeholder="e.g., 180"
             [ngClass]="{'invalid-touched': isInvalid('taille')}">
      <div *ngIf="isInvalid('taille')" class="error-msg">⚠️ Height is required (Min 100Cm).</div>
    </div>

    <div class="form-ctrl">
      <label>Target Weight (Kg)</label>
      <input type="number" formControlName="targetWeight" placeholder="e.g., 70"
             [ngClass]="{'invalid-touched': isInvalid('targetWeight')}">
      <div *ngIf="isInvalid('targetWeight')" class="error-msg">⚠️ Target weight is required.</div>
    </div>

    <div class="form-ctrl span-2">
      <label>Residential Address</label>
      <input type="text" formControlName="address" placeholder="Street name, City, Postal Code"
             [ngClass]="{'invalid-touched': isInvalid('address')}">
      <div *ngIf="isInvalid('address')" class="error-msg">⚠️ Full address path is required.</div>
    </div>

    <div class="form-ctrl">
      <label>Fitness Goal</label>
      <select formControlName="fitnessGoal" [ngClass]="{'invalid-touched': isInvalid('fitnessGoal')}">
        <option value="">Select Option...</option>
        <option value="weight-loss">Weight Loss</option>
        <option value="muscle-gain">Muscle Gain</option>
      </select>
      <div *ngIf="isInvalid('fitnessGoal')" class="error-msg">⚠️ Please choose your target goal.</div>
    </div>

    <div class="form-ctrl">
      <label>Fitness Level</label>
      <select formControlName="fitnessLevel" [ngClass]="{'invalid-touched': isInvalid('fitnessLevel')}">
        <option value="">Select Option...</option>
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>
      <div *ngIf="isInvalid('fitnessLevel')" class="error-msg">⚠️ Selection is required.</div>
    </div>

    <div class="form-ctrl span-2 imc-highlight-box">
      <label>Calculated Account IMC</label>
      <input type="text" formControlName="imc" class="imc-clean-input" placeholder="Awaiting Input Metrics...">
    </div>

  </div>
  <button type="submit" [disabled]="clientForm.invalid" class="btn-primary-submit">Save Client Profile</button>
</form>
