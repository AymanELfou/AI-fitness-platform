<h2 class="section-form-title">🏃‍♂️ Setup Client Metrics</h2>
<form [formGroup]="clientForm" (ngSubmit)="submit()">
  <div class="form-grid-layout">
    
    <div class="form-ctrl">
      <label>Age</label>
      <input type="number" formControlName="age" placeholder="e.g., 24"
             [ngClass]="{'invalid-touched': isInvalid('age')}">
      <div *ngIf="isInvalid('age')" class="error-msg">⚠️ Minimum age allowed is 12.</div>
    </div>

    <div class="form-ctrl">
      <label>Poids (Kg)</label>
      <input type="number" formControlName="poids" placeholder="e.g., 75"
             [ngClass]="{'invalid-touched': isInvalid('poids')}">
      <div *ngIf="isInvalid('poids')" class="error-msg">⚠️ Weight is required (Min 30Kg).</div>
    </div>

    <div class="form-ctrl">
      <label>Taille (Cm)</label>
      <input type="number" formControlName="taille" placeholder="e.g., 180"
             [ngClass]="{'invalid-touched': isInvalid('taille')}">
      <div *ngIf="isInvalid('taille')" class="error-msg">⚠️ Height is required (Min 100Cm).</div>
    </div>

    <div class="form-ctrl">
      <label>Fitness Goal (But)</label>
      <select formControlName="but" [ngClass]="{'invalid-touched': isInvalid('but')}">
        <option value="" disabled selected>Select Option...</option>
        <option value="Weight Loss">Weight Loss</option>
        <option value="Muscle Gain">Muscle Gain</option>
        <option value="Cardio Fitness">Cardio Fitness</option>
        <option value="General Health">General Health</option>
      </select>
      <div *ngIf="isInvalid('but')" class="error-msg">⚠️ Please choose your target goal.</div>
    </div>

    <div class="form-ctrl">
      <label>Fitness Level (Niveau)</label>
      <select formControlName="niveau" [ngClass]="{'invalid-touched': isInvalid('niveau')}">
        <option value="" disabled selected>Select Option...</option>
        <option value="Beginner">Beginner</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Advanced">Advanced</option>
      </select>
      <div *ngIf="isInvalid('niveau')" class="error-msg">⚠️ Selection is required.</div>
    </div>

    <div class="form-ctrl">
      <label>Subscription Plan</label>
      <select formControlName="subscriptionPlan" [ngClass]="{'invalid-touched': isInvalid('subscriptionPlan')}">
        <option value="FREEMIUM">Freemium Plan</option>
        <option value="PREMIUM">Premium Plan</option>
      </select>
      <div *ngIf="isInvalid('subscriptionPlan')" class="error-msg">⚠️ Selection is required.</div>
    </div>

    <div class="form-ctrl span-2 imc-highlight-box">
      <label>Calculated Account IMC</label>
      <input type="text" formControlName="imc" class="imc-clean-input" placeholder="Awaiting Input Metrics...">
    </div>

  </div>
  <button type="submit" [disabled]="clientForm.invalid" class="btn-primary-submit">Save</button>
</form>

<!-- Custom Success Alert Modal (ng-alert-box-popup) -->
<div class="alert-overlay" *ngIf="showSuccessAlert">
  <div class="alert-box">
    <div class="alert-icon-wrapper">
      <span class="alert-icon">✨</span>
    </div>
    <h3 class="alert-title">Success</h3>
    <p class="alert-message">Client profile created successfully</p>
    <button class="alert-btn" (click)="closeAlertAndNavigate()">Go to Dashboard</button>
  </div>
</div>
