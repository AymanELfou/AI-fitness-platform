<!-- ============================================================ -->
<!-- CLIENT NAVBAR                                                 -->
<!-- ============================================================ -->
<nav class="client-nav">
  <div class="client-nav__inner">

    <!-- ── LOGO ── -->
    <a routerLink="/client/dashboard" class="client-nav__logo">
      <span class="logo-smart">SMART</span><span class="logo-trainer">TRAINER</span>
    </a>

    <!-- ── DESKTOP LINKS ── -->
    <ul class="client-nav__links">
      <li *ngFor="let link of navLinks">
        <a
          [routerLink]="link.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="client-nav__link">
          {{ link.label }}
        </a>
      </li>
    </ul>

    <!-- ── RIGHT ACTIONS ── -->
    <div class="client-nav__actions">

      <!-- PRO badge -->
      <span class="pro-badge">PRO</span>

      <!-- Notification bell -->
      <button class="icon-btn notif-btn" aria-label="Notifications">
        <!-- Bell SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <!-- Unread badge dot -->
        <span *ngIf="notifCount > 0" class="notif-dot">{{ notifCount }}</span>
      </button>

      <!-- Profile icon + dropdown -->
      <div class="profile-wrapper" id="profile-menu-wrapper">
        <button class="icon-btn profile-btn" (click)="toggleProfile()" aria-label="Profile menu">
          <!-- User circle SVG -->
          <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </button>

        <!-- Dropdown menu -->
        <div *ngIf="profileDropdownOpen" class="profile-dropdown">
          <div class="dropdown-header">
            <div class="dropdown-avatar">A</div>
            <div>
              <div class="dropdown-name">Alex Johnson</div>
              <div class="dropdown-role">Premium Member</div>
            </div>
          </div>
          <div class="dropdown-divider"></div>
          <a routerLink="/client/profile" class="dropdown-item" (click)="profileDropdownOpen = false">
            <svg xmlns="http://www.w3.org/2000/svg" class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            My Profile
          </a>
          <a routerLink="/client/settings" class="dropdown-item" (click)="profileDropdownOpen = false">
            <svg xmlns="http://www.w3.org/2000/svg" class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Settings
          </a>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item dropdown-logout" (click)="logout()">
            <svg xmlns="http://www.w3.org/2000/svg" class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Log Out
          </button>
        </div>
      </div>

      <!-- Mobile hamburger -->
      <button class="hamburger" (click)="mobileMenuOpen = !mobileMenuOpen" aria-label="Toggle menu">
        <span [class]="mobileMenuOpen ? 'line line--top open' : 'line line--top'"></span>
        <span [class]="mobileMenuOpen ? 'line line--mid open' : 'line line--mid'"></span>
        <span [class]="mobileMenuOpen ? 'line line--bot open' : 'line line--bot'"></span>
      </button>
    </div>
  </div>

  <!-- ── MOBILE MENU ── -->
  <div *ngIf="mobileMenuOpen" class="mobile-menu">
    <a *ngFor="let link of navLinks"
      [routerLink]="link.path"
      routerLinkActive="active-mobile"
      (click)="mobileMenuOpen = false"
      class="mobile-link">
      {{ link.label }}
    </a>
    <button class="mobile-logout" (click)="logout()">Log Out</button>
  </div>
</nav>
