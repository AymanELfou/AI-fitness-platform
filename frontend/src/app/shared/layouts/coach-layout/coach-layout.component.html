<div class="coach-shell">

  <!-- ===== SIDEBAR ===== -->
  <aside class="coach-sidebar" [class.collapsed]="!sidebarOpen">

    <!-- Sidebar Background Image -->
    <div class="sidebar-bg">
      <img src="/images/coach-sidebar-banner.png" alt="Sidebar Background">
      <div class="sidebar-bg-overlay"></div>
    </div>

    <!-- Logo -->
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
            d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </div>
      <span class="logo-text" [class.hidden-text]="!sidebarOpen">
        Smart<span class="logo-accent">T</span>rainer
      </span>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">

      <a routerLink="/coach/dashboard"
         routerLinkActive="nav-active"
         class="nav-item">
        <svg class="nav-icon-svg" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
        </svg>
        <span class="nav-label" [class.hidden-text]="!sidebarOpen">Dashboard</span>
      </a>

      <a routerLink="/coach/clients"
         routerLinkActive="nav-active"
         class="nav-item">
        <svg class="nav-icon-svg" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span class="nav-label" [class.hidden-text]="!sidebarOpen">Mes Clients</span>
      </a>

      <a routerLink="/coach/programs"
         routerLinkActive="nav-active"
         class="nav-item">
        <svg class="nav-icon-svg" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
        </svg>
        <span class="nav-label" [class.hidden-text]="!sidebarOpen">Programmes</span>
      </a>

      <a routerLink="/coach/chat"
         routerLinkActive="nav-active"
         class="nav-item">
        <svg class="nav-icon-svg" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        <span class="nav-label" [class.hidden-text]="!sidebarOpen">Chat </span>
      </a>

      <a routerLink="/coach/community"
         routerLinkActive="nav-active"
         class="nav-item">
        <svg class="nav-icon-svg" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"/>
        </svg>
        <span class="nav-label" [class.hidden-text]="!sidebarOpen">Community</span>
      </a>

      <a routerLink="/coach/ai-assistant"
         routerLinkActive="nav-active"
         class="nav-item">
        <svg class="nav-icon-svg" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H4a2 2 0 01-2-2V5a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2h-1"/>
        </svg>
        <span class="nav-label" [class.hidden-text]="!sidebarOpen">AI Assistant</span>
      </a>

      <a routerLink="/coach/profile"
         routerLinkActive="nav-active"
         class="nav-item">
        <svg class="nav-icon-svg" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span class="nav-label" [class.hidden-text]="!sidebarOpen">Mon Profil</span>
      </a>

    </nav>

    <!-- Logout -->
    <div class="sidebar-footer">
      <button (click)="logout()" class="logout-btn">
        <svg class="nav-icon-svg" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        <span class="nav-label" [class.hidden-text]="!sidebarOpen">Déconnexion</span>
      </button>
    </div>
  </aside>





  

  <!-- ===== MAIN AREA ===== -->
  <div class="coach-main">

    <!-- Top Header -->
    <header class="coach-topbar">
      <div class="topbar-left">
        <button class="toggle-btn" (click)="toggleSidebar()">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <div class="topbar-breadcrumb">
          <span class="breadcrumb-role">Coach Panel</span>
        </div>
      </div>

      <div class="topbar-right">
        <!-- Notifications -->
        <button class="topbar-icon-btn notif-btn">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="notif-dot"></span>
        </button>
        <!-- User Info -->
        <div class="topbar-user">
          <div class="topbar-user-info">
            <p class="topbar-username">{{ authService.currentUser()?.firstname }} {{ authService.currentUser()?.lastname }}</p>
            <p class="topbar-role">Coach</p>
          </div>
          <div class="topbar-avatar">
            {{ authService.currentUser()?.firstname?.[0] || 'C' }}
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="coach-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
