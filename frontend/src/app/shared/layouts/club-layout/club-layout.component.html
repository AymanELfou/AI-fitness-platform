<div class="flex h-screen bg-gray-50 overflow-hidden">

  <!-- Sidebar -->
  <aside [class.w-64]="sidebarOpen" [class.w-20]="!sidebarOpen"
    class="relative bg-gray-900 border-r border-gray-800 flex-shrink-0 transition-all duration-300 flex flex-col z-20">

    <!-- Sidebar Background Image -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
      <img src="/images/club-sidebar-banner.png" class="w-full h-full object-cover opacity-50" alt="Sidebar Background">
      <div class="absolute inset-0 bg-gradient-to-b from-gray-900/95 via-gray-900/80 to-gray-900/95"></div>
    </div>

    <!-- Logo -->
    <div class="relative z-10 h-16 flex items-center px-6 border-b border-gray-800/60">
      <a routerLink="/" class="text-xl font-black text-primary whitespace-nowrap overflow-hidden">
        <span [class.hidden]="!sidebarOpen">SMART</span><span class="text-white">T</span>
      </a>
    </div>

    <!-- Navigation -->
    <nav class="relative z-10 flex-1 px-3 py-6 space-y-2 overflow-y-auto custom-scrollbar">

      <a routerLink="/club/dashboard" routerLinkActive="bg-primary/20 text-white border-r-4 border-primary"
        class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-400 hover:bg-white/10 hover:text-white transition-all">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
        </svg>
        <span [class.hidden]="!sidebarOpen" class="font-medium text-sm whitespace-nowrap">Dashboard</span>
      </a>

      <a routerLink="/club/coaches" routerLinkActive="bg-primary/20 text-white border-r-4 border-primary"
        class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-400 hover:bg-white/10 hover:text-white transition-all">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        <span [class.hidden]="!sidebarOpen" class="font-medium text-sm whitespace-nowrap">Coaches</span>
      </a>

      <a routerLink="/club/members" routerLinkActive="bg-primary/20 text-white border-r-4 border-primary"
        class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-400 hover:bg-white/10 hover:text-white transition-all">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <span [class.hidden]="!sidebarOpen" class="font-medium text-sm whitespace-nowrap">Members</span>
      </a>

      <a routerLink="/club/subscriptions" routerLinkActive="bg-primary/20 text-white border-r-4 border-primary"
        class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-400 hover:bg-white/10 hover:text-white transition-all">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
        </svg>
        <span [class.hidden]="!sidebarOpen" class="font-medium text-sm whitespace-nowrap">Subscriptions</span>
      </a>

      <a routerLink="/club/community" routerLinkActive="bg-primary/20 text-white border-r-4 border-primary"
        class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-400 hover:bg-white/10 hover:text-white transition-all">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z" />
        </svg>
        <span [class.hidden]="!sidebarOpen" class="font-medium text-sm whitespace-nowrap">Community</span>
      </a>

    </nav>

    <!-- Bottom -->
    <div class="relative z-10 p-4 border-t border-gray-800/60">
      <button (click)="logout()"
        class="flex items-center gap-3 px-3 py-3 w-full rounded-lg text-red-400 hover:bg-red-500/10 transition-all">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span [class.hidden]="!sidebarOpen" class="font-medium text-sm whitespace-nowrap">Log Out</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col min-w-0">

    <!-- Top Header -->
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6">
      <div class="flex items-center gap-4">
        <button (click)="toggleSidebar()" class="p-2 rounded-lg hover:bg-gray-100 text-gray-500">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <h1 class="text-lg font-semibold text-dark">Club Panel</h1>
      </div>

      <div class="flex items-center gap-4">
        <div class="text-right hidden sm:block">
          <p class="text-sm font-medium text-dark">{{ authService.currentUser()?.firstname }} {{
            authService.currentUser()?.lastname }}</p>
          <p class="text-xs text-gray-500">Club Owner</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold">
          {{ authService.currentUser()?.firstname?.[0] || 'C' }}
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
