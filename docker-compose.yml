
services:

  postgres:
    image: postgres:16-alpine
    container_name: smart_trainer_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_trainer_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8082:8082"
      - "8080:8082"
    depends_on:
      postgres:
        condition: service_healthy

  mongodb:
    image: mongo:7
    container_name: smart_trainer_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  gym-chatbot:
    build:
      context: ./IA/gym-chatbot
      dockerfile: Dockerfile
    container_name: smart_trainer_ai_chatbot
    restart: unless-stopped
    env_file: ./IA/gym-chatbot/.env
    ports:
      - "8000:8000"
    volumes:
      - ./IA/gym-chatbot/app:/code/app
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  coach-ai:
    build:
      context: ./IA/coach-ai
      dockerfile: Dockerfile
    container_name: smart_trainer_coach_ai
    restart: unless-stopped
    env_file: ./IA/coach-ai/.env
    ports:
      - "8001:8000"
    volumes:
      - ./IA/coach-ai/app:/code/app
      - ./IA/models:/code/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  postgres_data:
  mongodb_data: