apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: mohamedaminekharraz141/smart-trainer-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000 
          # --- AJOUT DES RESSOURCES POUR METRICS SERVER & HPA ---
          resources:
            requests:
              cpu: "100m"       # Minimum garanti (0.1 CPU)
              memory: "256Mi"   # Minimum garanti (256 Mo)
            limits:
              cpu: "500m"       # Limite maximale (0.5 CPU)
              memory: "512Mi"   # Limite maximale (512 Mo)
          # ------------------------------------------------------
          env:
            - name: API_URL
              value: "http://backend-service:8082"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort 
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 4000       
      targetPort: 4000 
      nodePort: 32000